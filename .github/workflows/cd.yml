name: CD

# Publish the backend image to GHCR after CI succeeds on main — never on a red build.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-ghcr
  cancel-in-progress: false

jobs:
  publish-backend-image:
    name: Publish backend image to GHCR
    runs-on: ubuntu-latest
    # only for a successful CI run that was triggered by a push to main
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # docker-container driver is required for the gha build cache export below
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wp-aissistant-backend
          tags: |
            type=raw,value=latest
            type=sha,value=${{ github.event.workflow_run.head_sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
