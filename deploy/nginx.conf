# Nginx reverse proxy with TLS termination for the WP AIssistant backend.
# Replace api.example.com and the certificate paths with your own. Obtain certs with
# certbot (Let's Encrypt): `certbot certonly --nginx -d api.example.com`.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # allow reasonably large document uploads to /ingest/document
    client_max_body_size 25m;

    # Block the metrics endpoint from the public internet. Scrape the backend
    # directly on the private network (backend:8000/metrics) instead.
    location = /metrics {
        return 404;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
