services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports: ["5432:5432"]
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollamadata:/root/.ollama"]

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://rag:rag@db:5432/rag
      # Chat stays on the local Ollama container (free, fast dev iteration). Embeddings go
      # to Cloudflare Workers AI (bge-m3, 1024-dim) to match the migrated schema — nomic-embed-text
      # is 768-dim and would need EMBED_DIM=768 + `alembic downgrade 0003_ingest_jobs` instead.
      LLM_API_BASE: http://ollama:11434
      CHAT_MODEL: ollama/llama3.1
      EMBED_MODEL: cloudflare/@cf/baai/bge-m3
      EMBED_DIM: "1024"
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:?set CLOUDFLARE_API_KEY in .env (Workers AI token)}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:?set CLOUDFLARE_ACCOUNT_ID in .env}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
      CORS_ALLOW_ALL: "true"
      OPERATOR_WEBHOOK_URL: ${OPERATOR_WEBHOOK_URL:-}
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  dbdata:
  ollamadata:
