# Production stack: the backend runs from the published GHCR image behind a Caddy reverse
# proxy (automatic HTTPS). The backend is NOT published to the host — only Caddy is (80/443).
#
# Prerequisiti:
#   1. Edita deploy/Caddyfile e metti il tuo dominio reale (il DNS deve puntare a questo host).
#   2. Esporta i secret prima di avviare:
#        export ADMIN_API_KEY=<token-robusto>
#        export POSTGRES_PASSWORD=<password-robusta>
#      (facoltativo) export BACKEND_IMAGE=ghcr.io/andreaem-it/wp-aissistant-backend:sha-<commit>
#
# Avvio:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml exec ollama ollama pull llama3.1
#   docker compose -f docker-compose.prod.yml exec ollama ollama pull nomic-embed-text
#
# Poi crea un client/operatore via /admin/clients (vedi README) e configura gli origin
# consentiti del widget con POST /admin/clients/{id}/origins (CORS è ristretto in prod).

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: rag
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes: ["ollamadata:/root/.ollama"]
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/andreaem-it/wp-aissistant-backend:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://rag:${POSTGRES_PASSWORD:-rag}@db:5432/rag
      LLM_API_BASE: http://ollama:11434
      CHAT_MODEL: ollama/llama3.1
      EMBED_MODEL: ollama/nomic-embed-text
      EMBED_DIM: "768"
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in the environment}
      # production posture: restrict CORS and configure per-client origins via the admin API
      CORS_ALLOW_ALL: "false"
      PANEL_ORIGINS: ${PANEL_ORIGINS:-}
      # the backend has no published ports (reachable only from caddy on the internal network),
      # so it can trust X-Forwarded-* — needed for per-IP rate limiting to see the real client IP
      FORWARDED_ALLOW_IPS: "*"
    # NOTE: intentionally no `ports:` — do not expose the backend to the host in production
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on: [backend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    restart: unless-stopped

volumes:
  dbdata:
  ollamadata:
  caddydata:
  caddyconfig:
